name: Infrastructure

on:
  push:
    branches: ["main"]
    paths:
      - "kereo-backend/infra/terraform/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: false
        default: false
        type: boolean

concurrency:
  group: terraform-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: eu-central-1
  TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
  TF_VAR_jwt_secret: ${{ secrets.TF_JWT_SECRET }}
  TF_VAR_github_webhook_secret: ${{ secrets.TF_GITHUB_WEBHOOK_SECRET }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./kereo-backend/infra/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check required Terraform variables
        run: |
          test -n "${{ vars.TF_FRONTEND_CONTAINER_IMAGE }}" || (echo "Missing repo variable TF_FRONTEND_CONTAINER_IMAGE" && exit 1)
          test -n "${{ vars.TF_PROJECT_NAME }}" || (echo "Missing repo variable TF_PROJECT_NAME" && exit 1)
          test -n "${{ vars.TF_STATE_BUCKET }}" || (echo "Missing repo variable TF_STATE_BUCKET" && exit 1)
          test -n "${{ vars.TF_STATE_KEY }}" || (echo "Missing repo variable TF_STATE_KEY" && exit 1)
          test -n "${{ vars.TF_CERTIFICATE_ARN }}" || (echo "Missing repo variable TF_CERTIFICATE_ARN" && exit 1)
          test -n "${{ vars.TF_HOSTED_ZONE_ID }}" || (echo "Missing repo variable TF_HOSTED_ZONE_ID" && exit 1)
          test -n "$TF_VAR_db_password" || (echo "Missing secret TF_DB_PASSWORD" && exit 1)
          test -n "$TF_VAR_jwt_secret" || (echo "Missing secret TF_JWT_SECRET" && exit 1)
          test -n "$TF_VAR_github_webhook_secret" || (echo "Missing secret TF_GITHUB_WEBHOOK_SECRET" && exit 1)

      - name: Write CI Terraform variables
        run: |
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          BACKEND_IMAGE="${{ vars.TF_BACKEND_CONTAINER_IMAGE }}"

          if [ -z "$BACKEND_IMAGE" ]; then
            BACKEND_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ vars.TF_PROJECT_NAME }}-apps:latest"
          fi

          echo "Using backend image: $BACKEND_IMAGE"
          echo "Using frontend image: ${{ vars.TF_FRONTEND_CONTAINER_IMAGE }}"

          cat > ci.auto.tfvars.json <<EOF
          {
            "aws_region": "eu-central-1",
            "project_name": "${{ vars.TF_PROJECT_NAME }}",
            "vpc_cidr": "${{ vars.TF_VPC_CIDR || '10.42.0.0/16' }}",
            "availability_zones": ${{ vars.TF_AVAILABILITY_ZONES || '["eu-central-1a","eu-central-1b"]' }},
            "public_subnet_cidrs": ${{ vars.TF_PUBLIC_SUBNET_CIDRS || '["10.42.0.0/24","10.42.1.0/24"]' }},
            "private_subnet_cidrs": ${{ vars.TF_PRIVATE_SUBNET_CIDRS || '["10.42.10.0/24","10.42.11.0/24"]' }},
            "db_username": "${{ vars.TF_DB_USERNAME || 'postgres' }}",
            "container_image": "${BACKEND_IMAGE}",
            "frontend_container_image": "${{ vars.TF_FRONTEND_CONTAINER_IMAGE }}",
            "certificate_arn": "${{ vars.TF_CERTIFICATE_ARN }}",
            "hosted_zone_id": "${{ vars.TF_HOSTED_ZONE_ID }}",
            "domain_name": "${{ vars.TF_DOMAIN_NAME || 'kereo.online' }}",
            "public_base_url": "${{ vars.TF_PUBLIC_BASE_URL || 'https://kereo.online' }}",
            "typeorm_synchronize": false
          }
          EOF

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          BACKEND_ARGS=(
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"
            -backend-config="key=${{ vars.TF_STATE_KEY }}"
            -backend-config="region=${{ vars.TF_STATE_REGION || env.AWS_REGION }}"
            -backend-config="encrypt=true"
          )

          if [ -n "${{ vars.TF_STATE_DYNAMODB_TABLE }}" ]; then
            BACKEND_ARGS+=(-backend-config="dynamodb_table=${{ vars.TF_STATE_DYNAMODB_TABLE }}")
          fi

          terraform init -input=false -reconfigure "${BACKEND_ARGS[@]}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply)
        run: terraform apply -auto-approve tfplan
