services:
  postgres:
    image: postgres:17
    container_name: kereo-postgres
    environment:
      POSTGRES_USER: kereo
      POSTGRES_PASSWORD: kereo
      POSTGRES_DB: kereo
    ports:
      - "5432:5432"
    volumes:
      - kereo_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kereo-redis
    ports:
      - "6379:6379"

volumes:
  kereo_pg_data: